{{ define "main" }}
<div class="container">
    <h1 class="page-title">{{ .Title }}</h1>
    <div class="card-grid">
        {{ range .Paginator.Pages }}
        <div class="card" style="border-left: 4px solid var(--accent); border-top: none;">
            <div style="display: flex; flex-direction: column; height: 100%;">
                <small class="text-gray-dark fw-bold" style="text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 15px;">{{ .Date.Format "January 02, 2006" }}</small>
                <h3 style="margin-bottom: 15px; font-size: 1.5rem; line-height: 1.3;"><a href="{{ .Permalink }}" style="color: var(--navy);">{{ .Title }}</a></h3>
                <p class="text-gray-dark mb-25" style="font-size: 0.95rem; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;">{{ .Summary }}</p>
                <div style="margin-top: auto;">
                    <a href="{{ .Permalink }}" class="fw-bold" style="display: inline-flex; align-items: center; gap: 8px;">Read Full Advisory <span>&rarr;</span></a>
                </div>
            </div>
        </div>
        {{ end }}
    </div>
    <div class="mt-50">
        {{ partial "pagination.html" . }}
    </div>
</div>
{{ end }}
